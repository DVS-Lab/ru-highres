name: pilot-scan

on:
  workflow_dispatch:
    inputs:
      datasets:
        description: "Comma-separated OpenNeuro accessions"
        default: "ds000001,ds000102,ds000117,ds000210,ds000246"
        required: true

jobs:
  pilot:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: analyses/openneuro_resolution_benchmark
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run pilot scan
        run: |
          IFS=',' read -ra DATASETS <<< "${{ inputs.datasets }}"
          ARGS=()
          for dataset in "${DATASETS[@]}"; do
            ARGS+=(--dataset "$dataset")
          done
          openneuro-voxels all \
            --database results/openneuro_voxel_scan.sqlite \
            --workers 8 \
            --resume \
            "${ARGS[@]}"
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: pilot-results
          path: |
            analyses/openneuro_resolution_benchmark/results/
            analyses/openneuro_resolution_benchmark/figures/
